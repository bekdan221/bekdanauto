<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BekdanAuto</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🚗 BEKDANAUTO</header>

<div class="filters">

<select id="brand">
<option value="all">All brands</option>
<option>BMW</option>
<option>Audi</option>
<option>Mercedes</option>
<option>Toyota</option>
<option>Honda</option>
<option>KIA</option>
</select>

<input id="minPrice" placeholder="Price from">
<input id="maxPrice" placeholder="Price to">

<input id="minMileage" placeholder="Mileage from">
<input id="maxMileage" placeholder="Mileage to">

<select id="condition">
<option value="all">Condition</option>
<option value="new">New</option>
<option value="used">Used</option>
</select>

<button onclick="applyFilters()">Search</button>

</div>

<div id="catalog" class="catalog"></div>

<script src="cars.js"></script>
<script src="app.js"></script>
<script src="js/filters.js"></script>
<script src="js/ui.js"></script>
<script src="js/effects.js"></script>

</body>
</html>
