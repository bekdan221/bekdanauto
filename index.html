<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mega Quiz</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ТИТУЛЬНАЯ -->
<div id="titleScreen" class="title">

  <div class="title-content">

    <div class="left-side">
      <div class="logo">🧠</div>

      <h1>MEGA QUIZ</h1>
      <h2>Test Game</h2>

      <button onclick="startApp()">Начать</button>
    </div>

    <div class="right-side">
      <img src="qr-code.jpg" class="qr">
    </div>

  </div>

</div>

<!-- ИГРА -->
<div id="game" style="display:none;">

<header>QUIZ GAME</header>

<div class="wrap">

  <div class="progress">
    <div id="bar"></div>
  </div>

  <div class="menu">
    <button onclick="startQuiz(0)">IQ</button>
    <button onclick="startQuiz(1)">IT</button>
    <button onclick="startQuiz(2)">CARS</button>
  </div>

  <div class="box">
    <h1 id="q">Выбери тест</h1>

    <div id="answers"></div>

    <button class="next" onclick="next()">ДАЛЕЕ</button>

    <div id="score"></div>
  </div>

</div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
