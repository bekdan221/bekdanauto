<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IT Quest Arena</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161616; padding: 40px; border-radius: 25px; width: 90%; max-width: 500px; text-align: center; border: 1px solid #333; }
        h1 { color: #ff3333; margin-bottom: 30px; }
        button { background: #222; color: #fff; border: 2px solid #333; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; margin: 10px 0; font-size: 18px; transition: 0.4s; }
        button:hover { background: #ff3333; border-color: #ff3333; transform: scale(1.05); }
    </style>
</head>
<body>

<div class="box" id="app">
    <h1>IT QUEST ARENA</h1>
    <p>Выберите испытание:</p>
    <button onclick="startQuiz('IT')">💻 IT Тест</button>
    <button onclick="startQuiz('IQ')">🧠 IQ Тест</button>
    <button onclick="startQuiz('Riddle')">🔮 Загадки</button>
</div>

<script>
    const data = {
        IT: [ { q: "Что такое Python?", a: ["Змея", "Язык программирования", "Еда"], correct: 1 } ],
        IQ: [ { q: "Сколько будет 2+2*2?", a: ["8", "6", "4"], correct: 1 } ],
        Riddle: [ { q: "Висит груша — нельзя скушать?", a: ["Лампочка", "Груша", "Луна"], correct: 0 } ]
    };

    function startQuiz(cat) {
        const q = data[cat][0];
        document.getElementById('app').innerHTML = `
            <h2>${cat} Испытание</h2>
            <p>${q.q}</p>
            ${q.a.map((text, i) => `<button onclick="alert('${i === q.correct ? 'Верно!' : 'Ошибка!'}'); location.reload()">${text}</button>`).join('')}
        `;
    }
</script>

</body>
</html>
