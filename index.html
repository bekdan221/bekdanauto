<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QUEST ARENA</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle, #1a1a2e, #16213e, #0f3460); 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
        }
        .box { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            padding: 40px; 
            border-radius: 30px; 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        h1 { font-size: 28px; margin-bottom: 20px; background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        button { 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 16px; 
            border-radius: 15px; 
            cursor: pointer; 
            width: 100%; 
            margin: 10px 0; 
            font-size: 16px; 
            transition: 0.3s; 
        }
        button:hover { background: rgba(255, 255, 255, 0.2); border-color: #00f2fe; transform: translateY(-3px); }
        .progress-bar { background: #333; height: 6px; border-radius: 3px; margin: 20px 0; }
        #progress { background: linear-gradient(to right, #4facfe, #00f2fe); height: 100%; width: 0%; border-radius: 3px; transition: 0.5s; }
    </style>
</head>
<body>

<div class="box" id="app">
    <h1>QUEST ARENA</h1>
    <p>Выберите испытание:</p>
    <button onclick="startQuiz('IT')">💻 IT Hardcore</button>
    <button onclick="startQuiz('Games')">🎮 Roblox & Games</button>
    <button onclick="startQuiz('IQ')">🧠 IQ Master</button>
</div>

<script>
    // ... (оставь тот же массив data, что и в прошлом коде)
    const data = {
        IT: [ /* твои вопросы */ ],
        Games: [ /* твои вопросы */ ],
        IQ: [ /* твои вопросы */ ]
    };

    let currentCat = "", qIdx = 0;
    function startQuiz(cat) { currentCat = cat; qIdx = 0; showQuestion(); }
    
    function showQuestion() {
        const q = data[currentCat][qIdx];
        document.getElementById('app').innerHTML = `
            <h2>${currentCat}</h2>
            <div class="progress-bar"><div id="progress" style="width: ${(qIdx / data[currentCat].length) * 100}%"></div></div>
            <p>${qIdx + 1} / ${data[currentCat].length}</p>
            <p style="font-size: 18px; margin: 20px 0;">${q.q}</p>
            ${q.a.map((text, i) => `<button onclick="check(${i})">${text}</button>`).join('')}
        `;
    }

    function check(idx) {
        if (idx === data[currentCat][qIdx].correct) {
            qIdx++;
            if (qIdx < data[currentCat].length) showQuestion();
            else document.getElementById('app').innerHTML = `<h2>ПОБЕДА!</h2><button onclick="location.reload()">В МЕНЮ</button>`;
        }
    }
</script>
</body>
</html>
