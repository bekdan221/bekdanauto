<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mega Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🧠 MEGA QUIZ</header>

<div class="wrap">

  <div class="progress">
    <div id="bar"></div>
  </div>

  <div class="menu">
    <button onclick="startQuiz(0)">IQ</button>
    <button onclick="startQuiz(1)">IT</button>
    <button onclick="startQuiz(2)">Cars</button>
    <button onclick="startQuiz(3)">Games</button>
    <button onclick="startQuiz(4)">Business</button>
    <button onclick="startQuiz(5)">Fun 1</button>
    <button onclick="startQuiz(6)">Fun 2</button>
  </div>

  <div class="box">

    <h1 id="q">Выбери тест</h1>

    <div id="answers"></div>

    <button class="next" onclick="next()">ДАЛЕЕ</button>

    <div id="score"></div>

  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
